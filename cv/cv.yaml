summary: |
  I'm Noah, an engineer specialising in workload identity, authentication and authorisation — on a mission to eliminate long-lived secrets and replace them with identity. I lead Teleport's Machine & Workload Identity product and sit on the SPIFFE Steering Committee.

  Above all, I'm a builder who loves to stay close to the user. I take products end-to-end — from problem discovery through shipping, to scaling in production and on to helping organisations adopt them.

  I'm not actively seeking new opportunities, but I'm open to discussing roles in workload identity or adjacent spaces — either building products in this field, or helping an organisation solve this problem from the inside.

experiences:
  - employer: Teleport
    title: "Machine & Workload Identity Lead"
    dates: May 2022 -- Present
    summary: |
      I lead the Machine & Workload Identity team, owning the product roadmap, working closely with customers and prospects to understand their problems and staying hands-on in engineering day-to-day.
      
      Under my leadership, Machine & Workload Identity has grown from a proof-of-concept feature into a product now deployed by some of the world's largest companies.
    highlights:
      - Designed and implemented technically complex functionality such as workload attestation and TPM authentication, with a focus on security and performance.
      - Drove the product roadmap through close engagement with customers and prospects, joining sales calls, supporting escalations and running customer interviews. Partnered with marketing and sales to position the product and shape its messaging.
      - Researched and explored emerging problem spaces in workload identity, including agentic identity, bringing insights from industry discussions in SPIFFE and WIMSE into Teleport's strategic context.
      - Acted as Teleport's subject matter expert on SPIFFE and workload identity, reviewing designs and guiding implementations across the wider engineering organisation.
      - Collaborated with customer organisations to build the internal case for adopting workload identity, taking into account their existing infrastructure, systems and organisational structure.
      - Represented Teleport at industry conferences including KubeCon, plus webinars, blog posts and talks.
      - Discovered and fixed several high- and critical-severity vulnerabilities in the Teleport codebase.
    technologies:
      - Workload Identity (SPIFFE/WIMSE)
      - Identity and credentials (PKI/X.509, JWT, WIT, OIDC, OAuth2)
      - Go
      - Linux
      - Kubernetes
      - gRPC/Protobuf

  - employer: SPIFFE
    title: "Steering Committee Member & Spec Maintainer"
    dates: Oct 2025 -- Present
    summary: |
      SPIFFE is the CNCF-graduated standard for workload identity, providing a vendor-neutral framework for issuing cryptographic identities to workloads. As a member of the Steering Committee I help govern the project and advocate for its adoption, and as a spec maintainer I refine existing specifications for clarity, review the work of fellow maintainers and author new ones (e.g. WIT-SVID, which brings the novel WIMSE WIT credential format into the SPIFFE ecosystem).

      The role exposes me to a diversity of identity problems across the industry, from established enterprise patterns to the cutting edge of agentic identity. SPIFFE's work is critical to establishing the interoperability standards that foster a healthy ecosystem and ease adoption of workload identity.

  - employer: Krystal
    title: Senior Engineer (Cloud Platform)
    dates: Apr 2021 -- Apr 2022
    summary: |
      Joined as a Go specialist on a strong Ruby team building Krystal's Katapult cloud platform. Designed and implemented the Kubernetes PaaS, including an operator to provision control-plane components for customer clusters and a CCM to integrate them with the wider platform. Acted as the team's SME on Go, cloud-native technologies and containerisation, and built a bespoke deployment tool for internal container-based applications that cut maintenance and deployment overhead where Kubernetes was overkill.
    technologies: [Go, Docker, Podman, Containerd, Kubernetes, gRPC]

  - employer: Cudo Ventures
    title: Senior Engineer (Infrastructure & SRE)
    dates: Dec 2020 -- Apr 2021
    summary: |
      Returned to Cudo to lead on SRE and operations. Owned the design, deployment and operation of on-prem Kubernetes clusters that kept infrastructure costs well below cloud equivalents, and led the wider adoption of Go across the engineering team.
    technologies: [GCP, Kubernetes, Prometheus, Pulumi, Go, MySQL]

  - employer: WalkUp
    title: Senior Backend Engineer
    dates: Jun 2020 -- Dec 2020
    summary: |
      Joined as the sole backend engineer at a pre-Series A startup hitting an inflection point in growth, owning the scaling of an event-driven microservices backend from 40,000 to over 800,000 customers per week in just three months. Diagnosed and resolved reliability and scaling issues in the pre-existing codebase while delivering new features, and mentored a junior backend engineer as the team grew.
    technologies: [Go, GCP, Kubernetes, Prometheus, RabbitMQ, Redis, Firestore]

  - employer: Cudo Ventures
    title: Software Engineer
    dates: Aug 2018 -- Jun 2020
    summary: |
      Joined as a junior fullstack engineer straight out of college, working across the Node.js API, Electron app and Vue web app. As the team grew, my role shifted into backend, infrastructure and distributed systems work (managing Kubernetes clusters, observability tooling and deployment mechanisms), supporting the team as Cudo first ran Go in production.
    technologies: [Vue, React, Electron, JavaScript, TypeScript, Go, GCP, Kubernetes, Ansible]

  - employer: Freelancing & Consulting
    title: Software Engineer
    dates: Nov 2016 -- Aug 2018
    summary: |
      Delivered freelance projects for a variety of clients with a focus on quality solutions that met their needs (generally fullstack web applications), and consulted with other developers on scaling and deploying their projects onto cloud platforms.

